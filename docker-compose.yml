services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: platform-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-platform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-platform_dev}
      POSTGRES_DB: ${POSTGRES_DB:-platform}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-platform} -d ${POSTGRES_DB:-platform}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: platform-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./services/api
    container_name: platform-api
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      API_ADDR: ":8080"
      POSTGRES_DSN: "postgres://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform_dev}@timescaledb:5432/${POSTGRES_DB:-platform}?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      JWT_SECRET: "${JWT_SECRET:-dev_secret_change_me_at_least_32_bytes_long}"
      JWT_ACCESS_TTL: "${JWT_ACCESS_TTL:-15m}"
      JWT_REFRESH_TTL: "${JWT_REFRESH_TTL:-720h}"
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY:-}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET:-}"
      SMTP_ADDR: "${SMTP_ADDR:-}"
      SMTP_USERNAME: "${SMTP_USERNAME:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      MAIL_FROM: "${MAIL_FROM:-no-reply@platform.local}"
      WEB_BASE_URL: "${WEB_BASE_URL:-http://localhost:5174}"
    ports:
      - "${API_PORT:-8080}:8080"

  ingest:
    build:
      context: ./services/ingest
    container_name: platform-ingest
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      POSTGRES_DSN: "postgres://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform_dev}@timescaledb:5432/${POSTGRES_DB:-platform}?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      EXCHANGE: "${EXCHANGE:-coinbase}"
      BINANCE_WS_URL: "${BINANCE_WS_URL:-wss://stream.binance.us:9443}"
      COINBASE_WS_URL: "${COINBASE_WS_URL:-wss://ws-feed.exchange.coinbase.com}"
      INGEST_SYMBOLS: "${INGEST_SYMBOLS:-BTC-USD}"
      INGEST_BATCH_SIZE: "${INGEST_BATCH_SIZE:-200}"
      INGEST_BATCH_INTERVAL: "${INGEST_BATCH_INTERVAL:-500ms}"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: platform-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-5173}:80"

volumes:
  timescale_data:
  redis_data:
